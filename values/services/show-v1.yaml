# show-v1 — версия v1 для canary split.
# Один Service (child) с селектором по version=v1, чтобы HTTPRoute мог направить трафик именно сюда.
# Ingress на этот релиз НЕ создаём — фронтдор через release show (parent Service).

appLabel: show
version: v1

image:
  repository: cr.yandex/crpd87adl3oop0ieiuk7/show
  tag: "v1"
  pullPolicy: IfNotPresent

replicaCount: 1
containerPort: 6050

deployment:
  enabled: true

service:
  enabled: true
  type: ClusterIP
  nameOverride: show-v1
  versionSelector: v1
  port: 80
  targetPort: 6050

ingress:
  enabled: false

# Mesh injection — sidecar linkerd-proxy подкинется автоматически
podAnnotations:
  linkerd.io/inject: enabled

env:
  - name: MICRO_SERVER_ADDRESS
    value: "0.0.0.0:6050"
  - name: BASE_DOMAIN
    value: "hex-server.site"
  - name: APP_VERSION
    value: "v1"

resources: {}

healthcheck:
  enabled: false
