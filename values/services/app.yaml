image:
  repository: cr.yandex/crpd87adl3oop0ieiuk7/app
  tag: "v1"
  pullPolicy: IfNotPresent

replicaCount: 1
containerPort: 80

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: app.hex-server.site
  path: /
  pathType: Prefix
  tls:
    enabled: true
    secretName: app-hex-server-site-tls

env: []
resources: {}
deployment:
  enabled: true
