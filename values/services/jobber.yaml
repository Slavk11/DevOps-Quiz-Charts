image:
  repository: cr.yandex/crpd87adl3oop0ieiuk7/jobber
  tag: "v1"
  pullPolicy: IfNotPresent

replicaCount: 1
containerPort: 8080

service:
  enabled: false
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: nginx
  host: ""
  path: /
  pathType: Prefix
  tls:
    enabled: false
    secretName: ""

env:
  - name: CONSUL_HTTP_ADDR
    value: http://consul:8500
  - name: MICRO_SERVER_ADDRESS
    value: 0.0.0.0:8080

resources: {}