# show-v2 — версия v2 для canary split.
# Тот же образ что у v1, отличается только env APP_VERSION и label version,
# чтобы визуально проверить распределение трафика в Linkerd Viz.

appLabel: show
version: v2

image:
  repository: cr.yandex/crpd87adl3oop0ieiuk7/show
  tag: "v1"
  pullPolicy: IfNotPresent

replicaCount: 1
containerPort: 6050

deployment:
  enabled: true

service:
  enabled: true
  type: ClusterIP
  nameOverride: show-v2
  versionSelector: v2
  port: 80
  targetPort: 6050

ingress:
  enabled: false

podAnnotations:
  linkerd.io/inject: enabled

env:
  - name: MICRO_SERVER_ADDRESS
    value: "0.0.0.0:6050"
  - name: BASE_DOMAIN
    value: "hex-server.site"
  - name: APP_VERSION
    value: "v2"

resources: {}

healthcheck:
  enabled: false
