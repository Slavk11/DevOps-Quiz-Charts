image:
  repository: cr.yandex/crpd87adl3oop0ieiuk7/uploader
  tag: "v1"
  pullPolicy: IfNotPresent

replicaCount: 1
containerPort: 8080

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: uploader.hex-server.site
  path: /
  pathType: Prefix
  tls:
    enabled: true
    secretName: uploader-hex-server-site-tls

env:
  - name: MICRO_SERVER_ADDRESS
    value: 0.0.0.0:8080

resources: {}