apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "service-chart.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "service-chart.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "service-chart.fullname" . }}
    spec:
      containers:
        - name: {{ include "service-chart.fullname" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
          env:
            - name: MICRO_REGISTRY
              value: "consul"
            - name: MICRO_REGISTRY_ADDRESS
              value: "consul:8500"
            - name: MICRO_TRANSPORT
              value: "nats"
            - name: MICRO_TRANSPORT_ADDRESS
              value: "nats:4222"
{{- with .Values.env }}
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.resources }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}